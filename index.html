<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#0f1115">
  <meta name="description" content="Osobní tréninkový deník — tréninky, série, tělesná váha.">
  <title>FitTrack</title>
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="icon" href="icons/icon-192.png">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header class="app-header">
    <h1 class="app-title">FitTrack</h1>
    <button id="btn-settings" class="icon-btn" aria-label="Nastavení a záloha dat">⚙️</button>
  </header>

  <main id="main">
    <section id="view-workout" class="view" hidden></section>
    <section id="view-weight" class="view" hidden></section>
    <section id="view-nutrition" class="view" hidden></section>
  </main>

  <nav class="bottom-nav">
    <button class="nav-btn" data-view="workout">
      <span class="nav-icon">🏋️</span>
      <span class="nav-label">Trénink</span>
    </button>
    <button class="nav-btn" data-view="weight">
      <span class="nav-icon">⚖️</span>
      <span class="nav-label">Váha</span>
    </button>
    <button class="nav-btn" data-view="nutrition">
      <span class="nav-icon">🍽️</span>
      <span class="nav-label">Jídelníček</span>
      <span class="nav-badge">brzy</span>
    </button>
  </nav>

  <dialog id="settings-dialog">
    <h2>Nastavení a data</h2>
    <p class="dialog-text">
      Data jsou uložená jen v tomto prohlížeči. Občas si stáhni zálohu,
      ať o historii nepřijdeš.
    </p>
    <div class="dialog-actions">
      <button id="btn-export" class="btn btn-primary">⬇️ Stáhnout zálohu (JSON)</button>
      <label class="btn btn-secondary file-btn">
        ⬆️ Obnovit ze zálohy
        <input type="file" id="input-import" accept=".json,application/json" hidden>
      </label>
    </div>
    <p class="dialog-meta" id="settings-meta"></p>
    <button id="btn-settings-close" class="btn btn-ghost">Zavřít</button>
  </dialog>

  <dialog id="exercise-dialog">
    <h2 id="exercise-dialog-title">Upravit cvik</h2>
    <form id="exercise-form">
      <label class="field">Název cviku
        <input id="ex-name" required maxlength="60" autocomplete="off">
      </label>
      <label class="field">Režim
        <select id="ex-mode">
          <option value="reps">Opakování (rozsah)</option>
          <option value="amrap">Max opakování</option>
          <option value="time">Na čas (sekundy)</option>
        </select>
      </label>
      <div class="form-row">
        <label class="field">Série
          <input id="ex-sets" type="number" min="1" max="10" required>
        </label>
        <label class="field ex-range">Od
          <input id="ex-min" type="number" min="1" max="600">
        </label>
        <label class="field ex-range">Do
          <input id="ex-max" type="number" min="1" max="600">
        </label>
      </div>
      <label class="field">Váha (kg) — u cviků s vlastní vahou nech prázdné
        <input id="ex-weight" type="number" min="0" max="500" step="0.5" inputmode="decimal">
      </label>
      <label class="field">Odpočinek mezi sériemi (s) — prázdné = 90 s
        <input id="ex-rest" type="number" min="15" max="600" step="15" inputmode="numeric">
      </label>
      <label class="field">Poznámka
        <input id="ex-note" maxlength="80" autocomplete="off">
      </label>
      <label class="field">Technika — jak cvik správně provést
        <textarea id="ex-howto" rows="5" placeholder="Popis provedení, jeden pokyn na řádek…"></textarea>
      </label>
      <div class="dialog-actions">
        <button type="submit" class="btn btn-primary">Uložit cvik</button>
        <button type="button" id="ex-cancel" class="btn btn-ghost">Zrušit</button>
      </div>
    </form>
  </dialog>

  <dialog id="exercise-stats-dialog">
    <h2 id="exercise-stats-title">Cvik</h2>
    <div id="exercise-stats-body"></div>
    <button id="exercise-stats-close" class="btn btn-ghost">Zavřít</button>
  </dialog>

  <script type="module" src="js/app.js"></script>
</body>
</html>
