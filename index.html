<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#0f1115">
  <meta name="description" content="Osobní tréninkový deník — tréninky, série, tělesná váha.">
  <title>FitTrack</title>
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="icon" href="icons/icon-192.png">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header class="app-header">
    <h1 class="app-title">FitTrack</h1>
    <button id="btn-settings" class="icon-btn" aria-label="Nastavení a záloha dat">⚙️</button>
  </header>

  <main id="main">
    <section id="view-workout" class="view" hidden></section>
    <section id="view-weight" class="view" hidden></section>
    <section id="view-nutrition" class="view" hidden></section>
  </main>

  <nav class="bottom-nav">
    <button class="nav-btn" data-view="workout">
      <span class="nav-icon">🏋️</span>
      <span class="nav-label">Trénink</span>
    </button>
    <button class="nav-btn" data-view="weight">
      <span class="nav-icon">⚖️</span>
      <span class="nav-label">Váha</span>
    </button>
    <button class="nav-btn" data-view="nutrition">
      <span class="nav-icon">🍽️</span>
      <span class="nav-label">Jídelníček</span>
      <span class="nav-badge">brzy</span>
    </button>
  </nav>

  <dialog id="settings-dialog">
    <h2>Nastavení a data</h2>
    <p class="dialog-text">
      Data jsou uložená jen v tomto prohlížeči. Občas si stáhni zálohu,
      ať o historii nepřijdeš.
    </p>
    <div class="dialog-actions">
      <button id="btn-export" class="btn btn-primary">⬇️ Stáhnout zálohu (JSON)</button>
      <label class="btn btn-secondary file-btn">
        ⬆️ Obnovit ze zálohy
        <input type="file" id="input-import" accept=".json,application/json" hidden>
      </label>
    </div>
    <p class="dialog-meta" id="settings-meta"></p>
    <button id="btn-settings-close" class="btn btn-ghost">Zavřít</button>
  </dialog>

  <script type="module" src="js/app.js"></script>
</body>
</html>
